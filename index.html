<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>🏆 德州荣耀</title>
<style>
  :root{ --gold:#FFC700; --bg:#0e0e10; --card:#1a1a1d; --line:#2a2a2e; --txt:#f2f2f5; --sub:#9a9aa0; --green:#34c759; }
  *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-text-size-adjust:100%}
  .wrap{max-width:680px;margin:0 auto;padding:16px}
  h1{font-size:22px;margin:6px 0 2px} .sub{color:var(--sub);font-size:13px;margin-bottom:10px}
  .search{display:block;width:100%;padding:10px 14px;margin:0 0 14px;border:1px solid var(--line);
    border-radius:10px;background:var(--card);color:var(--txt);font-size:15px;outline:none;-webkit-appearance:none}
  .search:focus{border-color:var(--gold)} .search::placeholder{color:var(--sub)}
  .empty{color:var(--sub);text-align:center;padding:24px;display:none}
  table{width:100%;border-collapse:collapse} thead th{color:var(--sub);font-weight:600;font-size:12px;text-align:right;padding:6px 8px}
  thead th.l{text-align:left}
  tbody tr{background:var(--card);cursor:pointer} tbody tr:active{filter:brightness(1.25)}
  /* rank-tier row tints (mirror the desktop app: 1-3 gold, 4-8 blue, 9-13 red) */
  tbody tr.rk-gold{background:#2c2818} tbody tr.rk-blue{background:#15273c} tbody tr.rk-red{background:#2e1818}
  td{padding:11px 8px;border-bottom:1px solid var(--line);text-align:right;font-size:15px}
  td.rank{width:30px;color:var(--sub);text-align:center;font-weight:700}
  td.name{text-align:left;font-weight:600} .top1 td.rank{color:var(--gold)}
  td.pts{color:var(--green);font-weight:700} td.coins{color:var(--gold);font-weight:700}
  .chev{color:var(--sub);font-size:12px;margin-left:4px}
  /* detail */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:10}
  .sheet{position:fixed;inset:0;overflow:auto;background:var(--bg);display:none;z-index:11;-webkit-overflow-scrolling:touch}
  .sheet.open,.overlay.open{display:block}
  .shead{position:sticky;top:0;background:var(--bg);padding:14px 16px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;z-index:2}
  .back{font-size:22px;color:var(--gold);background:none;border:none;cursor:pointer;padding:0 4px}
  .shead h2{font-size:19px;margin:0;flex:1}
  .stats{display:flex;gap:10px;padding:14px 16px}
  .stat{flex:1;background:var(--card);border-radius:12px;padding:12px;text-align:center}
  .stat .v{font-size:22px;font-weight:800} .stat .k{color:var(--sub);font-size:12px;margin-top:2px}
  .stat.coins .v{color:var(--gold)} .stat.pts .v{color:var(--green)}
  .cat{padding:16px 16px 4px;font-size:15px;font-weight:700;border-bottom:1px solid var(--line);margin:0 0 0}
  .cat.has{color:#e8e8ed} .cat.none{color:#5a5a5e}
  .grid{padding:6px 10px 2px}
  .badge{display:flex;align-items:center;gap:15px;padding:14px 6px;border-bottom:1px solid #1f1f23}
  .badge img{width:96px;height:96px;flex:none;cursor:pointer;-webkit-tap-highlight-color:transparent;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.6)) drop-shadow(0 12px 22px rgba(0,0,0,.55)) drop-shadow(0 0 8px rgba(190,196,208,.32));
    transition:transform .12s ease}
  .badge img:active{transform:scale(.9)}
  .badge.rare img{filter:drop-shadow(0 3px 4px rgba(0,0,0,.6)) drop-shadow(0 12px 22px rgba(0,0,0,.55)) drop-shadow(0 0 12px rgba(90,200,250,.65))}
  .badge.legendary img{filter:drop-shadow(0 3px 4px rgba(0,0,0,.6)) drop-shadow(0 12px 22px rgba(0,0,0,.55)) drop-shadow(0 0 14px rgba(255,199,0,.75))}
  .badge.locked img{filter:grayscale(1) brightness(.5) drop-shadow(0 4px 7px rgba(0,0,0,.5));opacity:.5}
  .bi{flex:1;min-width:0}
  .bn{font-weight:700;font-size:15px} .badge.locked .bn{color:#9a9aa0}
  .bd{color:var(--sub);font-size:12px;margin-top:1px;line-height:1.35}
  .bp{font-size:12px;margin-top:3px} .bp.done{color:var(--green);font-weight:700} .bp.prog{color:var(--gold)}
  .chip{font-size:11px;border-radius:6px;padding:1px 7px;font-weight:700}
  .r-common{background:rgba(192,192,197,.18);color:#c8c8cd} .r-rare{background:rgba(90,200,250,.18);color:#5ac8fa}
  .r-legendary{background:rgba(255,199,0,.18);color:var(--gold)}
  .foot{color:#55555c;font-size:11px;text-align:center;padding:18px}
  .xcount{font-size:12px;color:var(--gold);font-weight:700;margin-left:6px}
  /* row avatar */
  td.name .nmcell{display:flex;align-items:center;gap:10px}
  .rava{width:32px;height:32px;border-radius:50%;flex:none;background-size:cover;background-position:center 12%;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .nmtxt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* character-card detail hero */
  .cback{position:fixed;top:12px;left:12px;z-index:13;width:38px;height:38px;border-radius:50%;border:none;
    background:rgba(0,0,0,.45);color:#fff;font-size:23px;line-height:1;cursor:pointer;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .phero{position:relative;width:100%;background:#0a0a0c}
  .phero.card{overflow:hidden;aspect-ratio:1/1;max-height:60vh;animation:phglow 4.6s ease-in-out infinite}
  @keyframes phglow{0%,100%{box-shadow:inset 0 -70px 90px -50px var(--pc,#FFC700)}
    50%{box-shadow:inset 0 -70px 132px -44px var(--pc,#FFC700)}}
  .phwrap{position:absolute;inset:-6%;z-index:0;will-change:transform;transition:transform .12s ease-out}
  .pheroimg{width:100%;height:100%;object-fit:cover;object-position:50% 10%;display:block;
    animation:phbreathe 6s ease-in-out infinite;will-change:transform}
  @keyframes phbreathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.025)}}
  .phparts{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
  .phparts i{position:absolute;bottom:-14px;width:6px;height:6px;border-radius:50%;
    background:var(--pc,#FFC700);filter:blur(.5px);opacity:0;animation:phdrift linear infinite}
  @keyframes phdrift{0%{transform:translateY(0);opacity:0}12%{opacity:.85}100%{transform:translateY(-360px);opacity:0}}
  .phvig{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,rgba(6,6,8,.55) 0%,rgba(6,6,8,0) 26%,
    rgba(6,6,8,0) 48%,rgba(6,6,8,.9) 100%)}
  .phover{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;z-index:3}
  .prk{display:inline-block;font-size:11px;font-weight:800;letter-spacing:1px;padding:2px 9px;border-radius:6px;
    color:#1a1400;background:linear-gradient(135deg,#FFE070,var(--pc,#FFC700));box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .pnm{font-size:29px;font-weight:900;line-height:1.05;margin-top:6px;text-shadow:0 2px 12px rgba(0,0,0,.9)}
  .pti{font-size:15px;font-weight:700;color:var(--pc,#FFC700);margin-top:2px;text-shadow:0 1px 8px rgba(0,0,0,.95)}
  .phead2{display:flex;align-items:center;gap:14px;padding:20px 16px 8px}
  .pinit{width:62px;height:62px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:800;color:#fff}
  .phead2 .pnm{font-size:25px;text-shadow:none;margin-top:4px}
  .tiers{padding:12px 16px 2px;display:flex;flex-direction:column;gap:7px}
  .tier{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:11px;padding:8px 12px}
  .tier .tn{font-size:12px;font-weight:900;width:48px;flex:none}
  .tier .tmid{flex:1;min-width:0}
  .tier .treq{font-size:10px;color:var(--sub);margin-bottom:4px}
  .tier .tbar{height:6px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden}
  .tier .tbar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,#FFE070,var(--pc,#FFC700))}
  .tier .tval{font-size:11px;font-weight:800;flex:none;width:70px;text-align:right;color:var(--pc,#FFC700)}
  .tier.done .tval{color:var(--green)} .tier.done .tbar i{background:var(--green)}
  /* hi-res badge lightbox */
  .lb{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.84);display:none;
    align-items:center;justify-content:center;padding:28px;
    -webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px)}
  .lb.open{display:flex}
  .lbcard{max-width:380px;width:100%;text-align:center}
  .lbglow{position:relative;display:inline-block;line-height:0}
  .lbglow::before{content:'';position:absolute;inset:-26%;border-radius:50%;z-index:-1;
    background:radial-gradient(circle, var(--glow,rgba(255,255,255,.22)) 0%, transparent 62%);filter:blur(16px)}
  .lb img{width:76vw;max-width:340px;height:auto;
    filter:drop-shadow(0 18px 40px rgba(0,0,0,.88));animation:lbpop .26s cubic-bezier(.2,.9,.3,1.25)}
  .lb img.lg{filter:drop-shadow(0 18px 40px rgba(0,0,0,.88)) drop-shadow(0 0 32px rgba(255,199,0,.82))}
  .lb img.rr{filter:drop-shadow(0 18px 40px rgba(0,0,0,.88)) drop-shadow(0 0 30px rgba(90,200,250,.74))}
  @keyframes lbpop{from{transform:scale(.74);opacity:0}to{transform:scale(1);opacity:1}}
  .lbname{font-size:23px;font-weight:800;margin-top:20px}
  .lbdesc{color:var(--sub);font-size:14px;margin-top:12px;line-height:1.55;padding:0 12px}
  .lbstat{margin-top:15px;font-size:15px;font-weight:700}
  .lbstat.done{color:var(--green)} .lbstat.prog{color:var(--gold)}
  .lbhint{color:#6a6a70;font-size:12px;margin-top:22px}
  /* login gate */
  .gate{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;
    align-items:center;justify-content:center;padding:24px}
  .gatebox{width:100%;max-width:340px;text-align:center}
  .gtitle{font-size:30px;font-weight:800;margin-bottom:6px}
  .gsub{color:var(--sub);font-size:14px;margin-bottom:22px}
  .gpw{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);color:var(--txt);font-size:17px;outline:none;text-align:center;-webkit-appearance:none}
  .gpw:focus{border-color:var(--gold)}
  .gbtn{width:100%;margin-top:12px;padding:13px;border:none;border-radius:12px;cursor:pointer;
    background:var(--gold);color:#1a1400;font-size:17px;font-weight:800}
  .gbtn:disabled{opacity:.6}
  .gerr{color:#ff5a5f;font-size:13px;min-height:18px;margin-top:12px}
  /* private-badge PIN gate (inside the detail sheet) */
  .pinbox{padding:34px 20px;text-align:center}
  .pinhint{color:var(--sub);font-size:14px;line-height:1.7;margin-bottom:18px}
  .pinhint b{color:var(--txt)}
  .pinpw{width:170px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);color:var(--txt);font-size:19px;text-align:center;outline:none;letter-spacing:5px;-webkit-appearance:none}
  .pinpw:focus{border-color:var(--gold)}
  .pinbtn{display:block;margin:14px auto 0;padding:10px 30px;border:none;border-radius:10px;cursor:pointer;
    background:var(--gold);color:#1a1400;font-size:15px;font-weight:800}
  .pinerr{color:#ff5a5f;font-size:13px;min-height:18px;margin-top:12px}
  /* coin shop */
  .shop{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .shophdr{padding:14px 16px;font-size:16px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:8px;
           cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
  .shophdr .shoptip{font-size:11px;color:var(--sub);font-weight:600}
  .shophdr .shopchev{margin-left:auto;color:var(--sub);transition:transform .2s}
  .shop.open .shophdr .shopchev{transform:rotate(180deg)}
  .shoplist{border-top:1px solid var(--line)}
  .shoprow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bg)}
  .shoprow:last-child{border-bottom:none}
  .shopemoji{font-size:22px;width:30px;text-align:center;flex:none}
  .shopmid{flex:1;min-width:0}
  .shopname{font-size:15px;font-weight:700;color:var(--txt)}
  .shoplimit{font-size:11px;color:var(--sub);margin-top:2px}
  .shopcost{flex:none;color:var(--gold);font-weight:900;font-size:15px;background:rgba(255,199,0,.12);
            border-radius:20px;padding:5px 12px;white-space:nowrap}
</style></head>
<body>
<div class="gate" id="gate">
  <div class="gatebox">
    <div class="gtitle">🏆 德州荣耀</div>
    <div class="gsub">🔒 晚上去谁那里奋战？</div>
    <input id="pw" class="gpw" type="text" placeholder="答案" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" enterkeyhint="go">
    <button class="gbtn" id="gbtn">进入</button>
    <div class="gerr" id="gerr"></div>
  </div>
</div>
<div class="wrap" id="wrap" style="display:none">
  <h1>🏆 德州荣耀</h1>
  <div class="sub" id="sub"></div>
  <div class="shop" id="shopbox">
    <div class="shophdr" id="shophdr">🪙 金币商店<span class="shoptip">点击展开 · 用金币兑换</span><span class="shopchev" id="shopchev">▾</span></div>
    <div class="shoplist" id="shoplist" style="display:none"></div>
  </div>
  <input id="q" class="search" type="search" placeholder="🔍 搜索你的名字…" autocomplete="off">
  <table><thead><tr>
    <th class="l">#</th><th class="l">玩家</th><th>积分</th><th>🪙 金币</th><th>徽章</th>
  </tr></thead><tbody id="lb"></tbody></table>
  <div class="empty" id="empty">没找到这个名字 🤔</div>
  <div class="foot">点击玩家查看徽章进度 · 数据由 PokerTracker 导出</div>
</div>

<div class="overlay" id="ov" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <button class="cback" onclick="closeSheet()">‹</button>
  <div id="phero"></div>
  <div class="stats" id="pstats"></div>
  <div class="tiers" id="ptiers"></div>
  <div id="pbadges"></div>
  <div class="foot"><span id="punlocked"></span></div>
</div>

<div class="lb" id="lbox" onclick="closeLb()">
  <div class="lbcard">
    <div class="lbglow"><img id="lbimg" src="" alt=""></div>
    <div class="lbname" id="lbname"></div>
    <div><span class="chip" id="lbrarity"></span></div>
    <div class="lbdesc" id="lbdesc"></div>
    <div class="lbstat" id="lbstat"></div>
    <div class="lbhint">点击任意处关闭</div>
  </div>
</div>

let DATA = null;
const RC = {common:'r-common', rare:'r-rare', legendary:'r-legendary'};
const RL = {common:'○ 普通', rare:'◆ 稀有', legendary:'★ 传奇'};
const BY_NAME = {};

// ---- login gate: the data is AES-256-GCM encrypted; the password decrypts it
// client-side (WebCrypto). Wrong password → decrypt throws → "密码错误". ----
const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decryptBlob(blob, password){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password),
    {name:'PBKDF2'}, false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64d(blob.salt), iterations:blob.iter, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(blob.iv)}, key, b64d(blob.ct));
  return JSON.parse(new TextDecoder().decode(plain));
}
const PW_TTL = 5 * 24 * 60 * 60 * 1000;   // remember the login for 5 days
async function unlock(answer, persist){
  // The answer is the decryption key — normalize (trim + lowercase) so it is
  // matched case-insensitively, exactly as gen_web.py does before encrypting.
  const key = (answer || '').trim().toLowerCase();
  let data; try { data = await decryptBlob(ENC, key); } catch(e){ return false; }
  DATA = data;
  DATA.players.forEach(p => { BY_NAME[p.name] = p; });
  // Persist on MANUAL entry only, with a fixed 5-day expiry — so the gate
  // re-appears once every 5 days. Auto-unlocks pass persist=false and keep
  // the original expiry (no sliding renewal).
  if (persist) {
    try { localStorage.setItem('dzry_auth', JSON.stringify({k: key, exp: Date.now() + PW_TTL})); } catch(e){}
  }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('wrap').style.display = '';
  render();
  return true;
}

// ---- character cards ----
const CARDS = () => (DATA && DATA.cards) || {};
function cardFull(key){ return 'demo/img/' + key + '_full.png'; }
function cardAva(key){ return 'demo/img/' + key + '_avatar.png'; }
function hashHue(s){ let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0; return h % 360; }
function rowAva(p){
  const c = CARDS()[p.name];
  if (c) return `<span class="rava" style="background-image:url(${cardAva(c.key)})"></span>`;
  const ch = esc((p.name.trim()[0] || '?').toUpperCase());
  return `<span class="rava" style="background:hsl(${hashHue(p.name)} 42% 46%)">${ch}</span>`;
}
function renderTiers(box, badgesMap){
  const cats = DATA.categories.map(c => c.id), ncat = cats.length;
  const byCat = {}; cats.forEach(c => byCat[c] = 0);
  let total = 0;
  DATA.catalog.forEach(b => { if ((badgesMap[b.id] || {}).count > 0){ byCat[b.category] = (byCat[b.category] || 0) + 1; total++; } });
  const covered = cats.filter(c => byCat[c] >= 1).length;
  const base2 = cats.reduce((s, c) => s + Math.min(byCat[c] || 0, 2), 0);
  const t2done = base2 + Math.min(Math.max(0, total - base2), 3), need2 = 2 * ncat + 3;
  const T = [
    {n:'Tier 1', req:'各类别 ≥1 枚', done: covered >= ncat, pct: covered / ncat, rem: ncat - covered, unit:'类'},
    {n:'Tier 2', req:'各类别 ≥2 + 任意 3', done: t2done >= need2, pct: t2done / need2, rem: need2 - t2done, unit:'枚'},
    {n:'Tier 3', req:'任意 30 枚', done: total >= 30, pct: Math.min(total, 30) / 30, rem: Math.max(0, 30 - total), unit:'枚'},
  ];
  box.innerHTML = T.map(t => `<div class="tier${t.done ? ' done' : ''}"><div class="tn">${t.n}</div>`+
    `<div class="tmid"><div class="treq">${t.req}</div><div class="tbar"><i style="width:${Math.round(t.pct * 100)}%"></i></div></div>`+
    `<div class="tval">${t.done ? '✓ 已达成' : '还差 ' + t.rem + ' ' + t.unit}</div></div>`).join('');
}
// Inject the floating particles into the just-built card hero (breathe + glow
// are pure CSS; parallax tilt is wired once below and reads #phwrap live).
function setupHeroFx(){
  const parts = document.getElementById('phparts');
  if (!parts) return;
  parts.innerHTML = Array.from({length:14}, (_,i) => {
    const x = Math.round((i*61+13)%100), d = 4+(i*7%5), del = -(i*0.9%6), s = 4+(i%3)*2;
    return `<i style="left:${x}%;width:${s}px;height:${s}px;animation-duration:${d}s;animation-delay:${del}s"></i>`;
  }).join('');
}
(function(){
  const sheet = document.getElementById('sheet');
  function px(dx, dy){
    const w = document.getElementById('phwrap');
    if (w) w.style.transform = `translate(${dx*12}px,${dy*10}px) rotateY(${dx*4}deg) rotateX(${-dy*4}deg)`;
  }
  sheet.addEventListener('pointermove', e => {
    const hero = document.getElementById('phero');
    if (!document.getElementById('phwrap')) return;
    const r = hero.getBoundingClientRect();
    px((e.clientX-r.left)/r.width - .5, Math.max(-.5, Math.min(.5, (e.clientY-r.top)/r.height - .5)));
  });
  window.addEventListener('deviceorientation', e => {
    if (e.gamma == null) return;
    px(Math.max(-.5, Math.min(.5, e.gamma/45)), Math.max(-.5, Math.min(.5, (e.beta-40)/45)));
  });
})();

function renderShop(){
  const box = document.getElementById('shopbox'), list = document.getElementById('shoplist');
  if (!box || !list) return;
  const items = (DATA && DATA.shop) || [];
  if (!items.length){ box.style.display = 'none'; return; }
  box.style.display = '';
  list.innerHTML = items.map(it => {
    const lim = [];
    if (it.per_night_limit != null) lim.push('每晚限 ' + it.per_night_limit);
    if (it.season_stock != null) lim.push('赛季限 ' + it.season_stock);
    const note = lim.length ? `<div class="shoplimit">${esc(lim.join(' · '))}</div>` : '';
    return `<div class="shoprow"><div class="shopemoji">${esc(it.emoji || '🎁')}</div>`+
      `<div class="shopmid"><div class="shopname">${esc(it.name)}</div>${note}</div>`+
      `<div class="shopcost">🪙 ${it.cost}</div></div>`;
  }).join('');
  document.getElementById('shophdr').onclick = () => {
    const open = box.classList.toggle('open');
    list.style.display = open ? '' : 'none';
  };
}

function render(){
  document.getElementById('sub').textContent =
    `Season ${DATA.season} · Game ${DATA.game_num}/12 · ${DATA.players.length} 位玩家`;
  const lb = document.getElementById('lb');
  lb.innerHTML = '';
  DATA.players.forEach(p => {
    const tr = document.createElement('tr');
    const tier = p.rank <= 3 ? 'rk-gold' : p.rank <= 8 ? 'rk-blue' : p.rank <= 13 ? 'rk-red' : '';
    tr.className = ((p.rank === 1 ? 'top1 ' : '') + tier).trim();
    tr.dataset.name = p.name.toLowerCase();
    tr.innerHTML = `<td class="rank">${p.rank}</td>`+
      `<td class="name"><div class="nmcell">${rowAva(p)}<span class="nmtxt">${esc(p.name)}</span><span class="chev">›</span></div></td>`+
      `<td class="pts">${p.season_pts}</td>`+
      `<td class="coins">${p.coins}</td>`+
      `<td>${p.private ? '🔒' : p.unlocked + '/' + DATA.total_badges}</td>`;
    tr.onclick = () => openPlayer(p);
    lb.appendChild(tr);
  });
  const q = document.getElementById('q'), emptyMsg = document.getElementById('empty');
  q.oninput = () => {
    const v = q.value.trim().toLowerCase();
    let shown = 0;
    for (const tr of lb.children) {
      const hit = !v || tr.dataset.name.includes(v);
      tr.style.display = hit ? '' : 'none';
      if (hit) shown++;
    }
    emptyMsg.style.display = (v && shown === 0) ? 'block' : 'none';
  };
  renderShop();
  openFromHash();
}

// gate wiring
const gbtn = document.getElementById('gbtn'), pwIn = document.getElementById('pw'),
      gerr = document.getElementById('gerr');
async function submitPw(){
  gerr.textContent = ''; gbtn.disabled = true; gbtn.textContent = '验证中…';
  const ok = await unlock(pwIn.value, true);
  gbtn.disabled = false; gbtn.textContent = '进入';
  if (!ok){ gerr.textContent = '答案不对，再想想 🤔'; pwIn.value = ''; pwIn.focus(); }
}
gbtn.onclick = submitPw;
pwIn.addEventListener('keydown', e => { if (e.key === 'Enter') submitPw(); });
// auto-unlock if the password was entered within the last 5 days
(async () => {
  let saved = null;
  try {
    const raw = localStorage.getItem('dzry_auth');
    if (raw) {
      const o = JSON.parse(raw);
      if (o && o.exp > Date.now()) saved = o.k;
      else localStorage.removeItem('dzry_auth');
    }
  } catch(e){}
  if (saved && !(await unlock(saved, false))) { try { localStorage.removeItem('dzry_auth'); } catch(e){} }
  if (!DATA) pwIn.focus();
})();

let curBadges = {};
function renderBadges(box, badgesMap){
  box.innerHTML = '';
  curBadges = badgesMap;
  DATA.categories.forEach(cat => {
    const items = DATA.catalog.filter(b => b.category === cat.id);
    if (!items.length) return;
    const earned = items.filter(b => (badgesMap[b.id]||{}).count > 0).length;
    const h = document.createElement('div');
    h.className = 'cat ' + (earned ? 'has' : 'none');
    h.textContent = `${cat.label}  (${earned}/${items.length})`;
    box.appendChild(h);
    const g = document.createElement('div'); g.className = 'grid';
    items.forEach(b => {
      const pb = badgesMap[b.id] || {count:0, progress:''};
      const got = pb.count > 0;
      const xc = pb.count > 1 ? `<span class="xcount">×${pb.count}</span>` : '';
      let pl = '';
      if (got) pl = `<div class="bp done">已获得${xc.replace('xcount','')}</div>`;
      else if (pb.progress) pl = `<div class="bp prog">${esc(pb.progress)}</div>`;
      const row = document.createElement('div');
      row.className = 'badge ' + (got ? 'got ' + b.rarity : 'locked');
      row.innerHTML = `<img src="${b.img}" loading="lazy" onclick="openLb('${b.id}')">`+
        `<div class="bi"><div class="bn">${esc(b.name)}${got?xc:''}</div>`+
        `<div class="bd">${esc(b.desc)}</div>${pl}</div>`+
        `<span class="chip ${RC[b.rarity]}">${RL[b.rarity]}</span>`;
      g.appendChild(row);
    });
    box.appendChild(g);
  });
}

function openPlayer(p){
  const card = CARDS()[p.name] || null;
  const sheet = document.getElementById('sheet');
  sheet.style.setProperty('--pc', card ? card.theme : '#FFC700');
  const hero = document.getElementById('phero');
  if (card){
    hero.className = 'phero card';
    hero.innerHTML = `<div class="phwrap" id="phwrap"><img class="pheroimg" src="${cardFull(card.key)}" alt=""></div>`+
      `<div class="phparts" id="phparts"></div>`+
      `<div class="phvig"></div>`+
      `<div class="phover"><span class="prk">RANK ${p.rank}</span>`+
      `<div class="pnm">${esc(p.name)}</div><div class="pti">${esc(card.title)}</div></div>`;
    setupHeroFx();
  } else {
    hero.className = 'phero';
    const ch = esc((p.name.trim()[0] || '?').toUpperCase());
    hero.innerHTML = `<div class="phead2"><div class="pinit" style="background:hsl(${hashHue(p.name)} 42% 46%)">${ch}</div>`+
      `<div><span class="prk">RANK ${p.rank}</span><div class="pnm">${esc(p.name)}</div></div></div>`;
  }
  document.getElementById('pstats').innerHTML =
    `<div class="stat pts"><div class="v">${p.season_pts}</div><div class="k">本赛季积分</div></div>`+
    `<div class="stat coins"><div class="v">${p.coins}</div><div class="k">🪙 金币</div></div>`+
    `<div class="stat"><div class="v">${p.games}</div><div class="k">出席场次</div></div>`;
  const box = document.getElementById('pbadges'), tiersBox = document.getElementById('ptiers');
  if (p.private) { document.getElementById('punlocked').textContent = '🔒 徽章已隐藏'; tiersBox.innerHTML = ''; showPinGate(p, box); }
  else { document.getElementById('punlocked').textContent = `已解锁 ${p.unlocked} / ${DATA.total_badges}`; renderTiers(tiersBox, p.badges); renderBadges(box, p.badges); }
  document.getElementById('ov').classList.add('open');
  sheet.classList.add('open');
  sheet.scrollTop = 0;
  // Shareable / bookmarkable deep link — e.g. .../#p=张三 opens straight here.
  history.replaceState(null, '', '#p=' + encodeURIComponent(p.name));
}

// Private player: badges are PIN-encrypted. Ask for the owner's PIN (auto-use
// a PIN already entered this session); only the correct PIN decrypts them.
function showPinGate(p, box){
  let cached = null; try { cached = sessionStorage.getItem('pin_' + p.name); } catch(e){}
  if (cached) { revealPrivate(p, box, cached, true); return; }
  box.innerHTML =
    `<div class="pinbox">`+
      `<div class="pinhint">🔒 该玩家已隐藏徽章<br>输入<b>本人 PIN</b> 查看</div>`+
      `<input class="pinpw" id="pinIn" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off" enterkeyhint="go">`+
      `<button class="pinbtn" id="pinBtn">查看</button>`+
      `<div class="pinerr" id="pinErr"></div>`+
    `</div>`;
  const inp = document.getElementById('pinIn'), btn = document.getElementById('pinBtn');
  const go = () => revealPrivate(p, box, inp.value, false);
  btn.onclick = go;
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
  inp.focus();
}
async function revealPrivate(p, box, pin, fromCache){
  const blob = (DATA.private_badges || {})[p.name];
  if (!blob) { box.innerHTML = '<div class="pinhint">（暂无徽章数据）</div>'; return; }
  let obj;
  try { obj = await decryptBlob(blob, pin); }
  catch(e){
    try { sessionStorage.removeItem('pin_' + p.name); } catch(_){}
    if (fromCache) { showPinGate(p, box); return; }
    const err = document.getElementById('pinErr'); if (err) err.textContent = 'PIN 不正确，请重试';
    return;
  }
  try { sessionStorage.setItem('pin_' + p.name, pin); } catch(e){}
  document.getElementById('punlocked').textContent = `已解锁 ${obj.unlocked} / ${DATA.total_badges}`;
  renderTiers(document.getElementById('ptiers'), obj.badges || {});
  renderBadges(box, obj.badges || {});
}
function closeSheet(){
  document.getElementById('ov').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  if (location.hash) history.replaceState(null, '', location.pathname + location.search);
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Hi-res badge lightbox — tap a badge image to view the full-resolution art.
function openLb(bid){
  const b = (DATA.catalog || []).find(x => x.id === bid);
  if (!b) return;
  const pb = curBadges[bid] || {count:0, progress:''};
  const got = pb.count > 0;
  const img = document.getElementById('lbimg');
  img.src = b.img;
  img.className = b.rarity === 'legendary' ? 'lg' : (b.rarity === 'rare' ? 'rr' : '');
  document.getElementById('lbname').textContent = b.name + (pb.count > 1 ? `  ×${pb.count}` : '');
  const rc = document.getElementById('lbrarity');
  rc.className = 'chip ' + RC[b.rarity];
  rc.textContent = RL[b.rarity];
  document.getElementById('lbdesc').textContent = b.desc;
  const st = document.getElementById('lbstat');
  if (got){ st.className = 'lbstat done'; st.textContent = '✓ 已获得'; }
  else if (pb.progress){ st.className = 'lbstat prog'; st.textContent = '🔒 ' + pb.progress; }
  else { st.className = 'lbstat prog'; st.textContent = '🔒 未解锁'; }
  const glow = b.rarity === 'legendary' ? 'rgba(255,199,0,.5)'
             : b.rarity === 'rare' ? 'rgba(90,200,250,.45)' : 'rgba(200,205,215,.34)';
  document.getElementById('lbox').style.setProperty('--glow', glow);
  document.getElementById('lbox').classList.add('open');
}
function closeLb(){ document.getElementById('lbox').classList.remove('open'); }

// If opened via a personal link (.../#p=<name>), jump straight to that sheet.
function openFromHash(){
  const m = location.hash.match(/^#p=(.+)$/);
  if (!m) return;
  let name; try { name = decodeURIComponent(m[1]); } catch(e){ return; }
  const p = BY_NAME[name];
  if (p) openPlayer(p);
}
